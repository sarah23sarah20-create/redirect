.warning{
  font-size:22px;
  margin-bottom:20px;
  color:#ff3b3b;
  font-weight:bold;
}

a{
  display:inline-block;
  padding:20px 40px;
  background:red;
  color:white;
  font-size:20px;
  border-radius:12px;
  text-decoration:none;
  animation: shake 1s infinite;
}

@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(3px); }
  50% { transform: translateX(-3px); }
  75% { transform: translateX(3px); }
  100% { transform: translateX(0); }
}
</style>
