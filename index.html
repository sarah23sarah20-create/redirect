<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#000;
margin:0;
font-family:Arial;
}

.linkbtn{
background:red;
color:white;
padding:22px 45px;
font-size:22px;
font-weight:bold;
border-radius:14px;
text-decoration:none;
box-shadow:0 0 20px red;
animation:shake 0.6s infinite;
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-4px)}
50%{transform:translateX(4px)}
75%{transform:translateX(-4px)}
100%{transform:translateX(0)}
}
</style>
</head>

<body>

<a class="linkbtn" href="https://t.bl-fastcdn.com/directclick/?pid=LtcOpdZ1vipde6Kf26wSmHTBHMI1">
Press & Hold to Watch 🔞
</a>

</body>
</html>
