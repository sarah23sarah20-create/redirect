<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>18+ Access</title>

<style>
body{
  margin:0;
  background:black;
  font-family:Arial, sans-serif;
  text-align:center;
  color:white;
}

.container{
  position:relative;
}

img{
  width:100%;
  filter: blur(6px);
}

.overlay{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

#holdBtn{
  padding:18px 35px;
  font-size:20px;
  background:red;
  color:white;
  border:none;
  border-radius:12px;
  cursor:pointer;
  animation: shake 1s infinite;
}

#openBtn{
  display:none;
  margin-top:20px;
  padding:15px 30px;
  font-size:18px;
  background:limegreen;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* Shake animation */
@keyframes shake {
  0% { transform: translate(0px, 0px); }
  25% { transform: translate(2px, 0px); }
  50% { transform: translate(-2px, 0px); }
  75% { transform: translate(2px, 0px); }
  100% { transform: translate(0px, 0px); }
}
</style>
</head>
<body>

<div class="container">
  <img src="fotoja.jpg">
  
  <div class="overlay">
    <button id="holdBtn">HOLD TO VERIFY 18+</button>
    <br>
    <button id="openBtn">OPEN IN BROWSER</button>
  </div>
</div>

<script>
let holdTimer;

const holdBtn = document.getElementById("holdBtn");
const openBtn = document.getElementById("openBtn");

holdBtn.addEventListener("touchstart", startHold);
holdBtn.addEventListener("mousedown", startHold);

holdBtn.addEventListener("touchend", cancelHold);
holdBtn.addEventListener("mouseup", cancelHold);
holdBtn.addEventListener("mouseleave", cancelHold);

function startHold(){
  holdTimer = setTimeout(() => {
    openBtn.style.display = "inline-block";
    holdBtn.style.animation = "none";
  }, 1500); // 1.5 seconds hold
}

function cancelHold(){
  clearTimeout(holdTimer);
}

openBtn.addEventListener("click", function(){
  window.open("https://t.ajrkmx1.com/403824/8780/0?bo=2779,2778,2777,2776,2775&po=6533&aff_sub5=SF_006OG000004lmDN","_blank");
});
</script>

</body>
</html>
