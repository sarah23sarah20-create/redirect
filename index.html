<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security Check</title>

<style>

body{
background:#0a1026;
color:white;
font-family:Arial, sans-serif;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

.box{
width:90%;
max-width:420px;
background:#111a3a;
padding:40px;
border-radius:14px;
text-align:center;
box-shadow:0 0 40px rgba(0,0,0,0.6);
}

h2{
font-size:28px;
margin-bottom:10px;
}

p{
opacity:0.8;
font-size:18px;
}

.bar{
width:100%;
height:10px;
background:#1e2a55;
border-radius:10px;
margin-top:25px;
overflow:hidden;
}

.progress{
height:100%;
width:0%;
background:#22c55e;
animation:load 4s linear forwards;
}

@keyframes load{
0%{width:0%}
100%{width:100%}
}

button{
margin-top:25px;
width:100%;
padding:18px;
font-size:20px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

input{
transform:scale(1.5);
margin-right:10px;
}

</style>
</head>

<body>

<div class="box">

<h2>Security Verification</h2>

<p>Checking your browser before accessing the page.</p>

<div class="bar">
<div class="progress"></div>
</div>

<div style="margin-top:30px">
<label>
<input type="checkbox" id="check">
I am human
</label>
</div>

<button onclick="go()">Continue</button>

</div>

<script>

function go(){
if(document.getElementById("check").checked){
window.location.href="https://ezbiolink.com/Privateplay";
}else{
alert("Please confirm verification");
}
}

</script>

</body>
</html>
