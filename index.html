<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
}

/* FOTO FULL SCREEN */
.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
}

/* BUTONI */
.btn{
position:absolute;
bottom:120px;
left:50%;
transform:translateX(-50%);
background:#ff1a1a;
color:white;
padding:25px 35px;
font-size:26px;
font-weight:bold;
border-radius:20px;
text-align:center;
text-decoration:none;
box-shadow:0 0 25px rgba(255,0,0,0.8);
animation:shake 0.6s infinite;
}

/* DRIDHJA */
@keyframes shake{
0%{transform:translate(-50%,0)}
25%{transform:translate(-53%,0)}
50%{transform:translate(-47%,0)}
75%{transform:translate(-53%,0)}
100%{transform:translate(-50%,0)}
}
</style>

</head>

<body>

<img class="bg" src="https://images.unsplash.com/photo-1518611012118-696072aa579a">

<a class="btn" href="https://t.bl-fastcdn.com/directclick/?pid=LtcOpdZ1vipde6Kf26wSmHTBHMI1">
Press & Hold to Watch 🔞
</a>

</body>
</html>
