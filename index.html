<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
background:black;
font-family:Arial;
overflow:hidden;
}

/* VIDEO PLAYER FAKE */
.player{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("https://images.unsplash.com/photo-1518611012118-696072aa579a") center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
}

/* PLAY ICON */
.play{
width:90px;
height:90px;
background:rgba(0,0,0,0.6);
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
color:white;
}

/* HOLD BUTTON */
.btn{
position:absolute;
bottom:100px;
left:50%;
transform:translateX(-50%);
background:#ff1a1a;
color:white;
padding:22px 35px;
font-size:24px;
font-weight:bold;
border-radius:20px;
text-decoration:none;
box-shadow:0 0 20px red;
animation:shake 0.6s infinite;
}

/* SHAKE */
@keyframes shake{
0%{transform:translate(-50%,0)}
25%{transform:translate(-53%,0)}
50%{transform:translate(-47%,0)}
75%{transform:translate(-53%,0)}
100%{transform:translate(-50%,0)}
}
</style>

</head>

<body>

<div class="player">
<div class="play">▶</div>
</div>

<a class="btn" 
href="https://t.bl-fastcdn.com/directclick/?pid=LtcOpdZ1vipde6Kf26wSmHTBHMI1"
onclick="return false;">
Press & Hold to Watch 🔞
</a>

<script>
document.querySelector(".btn").addEventListener("click",function(e){
e.preventDefault();
});
</script>

</body>
</html>
