<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  background:black;
  text-align:center;
  margin-top:120px;
  font-family:Arial, sans-serif;
  color:white;
}

/* Text above */
.warning{
  font-size:22px;
  margin-bottom:25px;
  color:#ff4444;
  font-weight:bold;
}

/* Link button */
a{
  display:inline-block;
  padding:20px 40px;
  background:red;
  color:white;
  font-size:20px;
  border-radius:12px;
  text-decoration:none;
  animation: shake 1s infinite;
}

/* Disable normal click */
a:active{
  pointer-events:none;
}

/* Shake animation */
@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(3px); }
  50% { transform: translateX(-3px); }
  75% { transform: translateX(3px); }
  100% { transform: translateX(0); }
}
</style>
</head>
<body>

<div class="warning">
Only for 18+ Adults
</div>

<a href="https://t.ajrkmx1.com/403824/8780/0?bo=2779,2778,2777,2776,2775&po=6533&aff_sub5=SF_006OG000004lmDN"
onclick="return false;">
HOLD TO OPEN
</a>

</body>
</html>
